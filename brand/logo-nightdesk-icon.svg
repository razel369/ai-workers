<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Nightdesk icon">
  <title>Nightdesk icon</title>
  <defs>
    <linearGradient id="ic-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1219"/>
      <stop offset="100%" stop-color="#080b10"/>
    </linearGradient>

    <linearGradient id="ic-tileEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3340" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2a3340" stop-opacity="0.2"/>
    </linearGradient>

    <linearGradient id="ic-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c79a"/>
      <stop offset="55%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b88a5a"/>
    </linearGradient>

    <radialGradient id="ic-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#d4a574" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ic-bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f141c"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background tile (scales from 32px to 256px) -->
  <rect x="8" y="8" width="240" height="240" rx="56" ry="56" fill="url(#ic-bg)"/>
  <rect x="9.5" y="9.5" width="237" height="237" rx="54.5" ry="54.5"
        fill="none" stroke="url(#ic-tileEdge)" stroke-width="2"/>

  <!-- Soft warm glow behind bubble -->
  <circle cx="128" cy="128" r="96" fill="url(#ic-glow)"/>

  <!-- Speech bubble with tail bottom-left -->
  <path d="
      M 56 70
      H 200
      Q 218 70 218 88
      V 168
      Q 218 186 200 186
      H 108
      L 80 214
      L 86 186
      H 56
      Q 38 186 38 168
      V 88
      Q 38 70 56 70
      Z"
    fill="url(#ic-bubble)"
    stroke="#2a3340"
    stroke-width="2.5"
    stroke-linejoin="round"/>

  <!-- Crescent moon (gold) -->
  <circle cx="128" cy="126" r="40" fill="url(#ic-gold)"/>
  <circle cx="143" cy="116" r="35" fill="#0a0e14"/>

  <!-- Tiny accent stars -->
  <circle cx="74" cy="100" r="2.4" fill="#d4a574" opacity="0.9"/>
  <circle cx="190" cy="104" r="2" fill="#d4a574" opacity="0.7"/>
  <circle cx="184" cy="160" r="1.6" fill="#d4a574" opacity="0.5"/>
  <circle cx="66" cy="148" r="1.4" fill="#d4a574" opacity="0.45"/>
</svg>