<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" role="img" aria-label="Nightdesk logo">
  <title>Nightdesk</title>
  <defs>
    <!-- Rounded-square background for the icon -->
    <linearGradient id="nd-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1219"/>
      <stop offset="100%" stop-color="#080b10"/>
    </linearGradient>

    <!-- Subtle inner highlight on the tile -->
    <linearGradient id="nd-tileEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3340" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2a3340" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Warm gold gradient for the moon and dot -->
    <linearGradient id="nd-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c79a"/>
      <stop offset="55%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b88a5a"/>
    </linearGradient>

    <!-- Soft glow under the moon -->
    <radialGradient id="nd-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#d4a574" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>

    <!-- Speech-bubble fill gradient (deep, calm) -->
    <linearGradient id="nd-bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f141c"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </linearGradient>
  </defs>

  <!-- Icon mark, 120x120 viewBox area -->
  <g transform="translate(8, 8)">
    <!-- Rounded square background tile -->
    <rect x="0" y="0" width="104" height="104" rx="24" ry="24" fill="url(#nd-bg)"/>
    <rect x="0.75" y="0.75" width="102.5" height="102.5" rx="23.25" ry="23.25"
          fill="none" stroke="url(#nd-tileEdge)" stroke-width="1.5"/>

    <!-- Soft warm glow centered behind bubble -->
    <circle cx="52" cy="52" r="40" fill="url(#nd-glow)"/>

    <!-- Speech bubble: rounded rectangle with tail bottom-left -->
    <path d="
        M 22 28
        H 82
        Q 90 28 90 36
        V 70
        Q 90 78 82 78
        H 44
        L 32 90
        L 34 78
        H 22
        Q 14 78 14 70
        V 36
        Q 14 28 22 28
        Z"
      fill="url(#nd-bubble)"
      stroke="#2a3340"
      stroke-width="1.25"
      stroke-linejoin="round"/>

    <!-- Crescent moon inside the bubble -->
    <!-- Outer moon disc (gold) -->
    <circle cx="52" cy="53" r="16" fill="url(#nd-gold)"/>
    <!-- Inner cutout (background-coloured) creates crescent -->
    <circle cx="58.5" cy="49" r="14" fill="#0a0e14"/>

    <!-- Tiny accent stars -->
    <circle cx="30" cy="42" r="1.1" fill="#d4a574" opacity="0.85"/>
    <circle cx="78" cy="44" r="0.9" fill="#d4a574" opacity="0.6"/>
    <circle cx="74" cy="66" r="0.7" fill="#d4a574" opacity="0.45"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(132, 0)">
    <!-- 'Nightdesk' wordmark -->
    <text x="0" y="70"
          font-family="Inter, 'Helvetica Neue', system-ui, -apple-system, sans-serif"
          font-weight="700"
          font-size="44"
          letter-spacing="-1.2"
          fill="#e6e6e6">Nightdesk</text>

    <!-- Warm-gold period accent -->
    <circle cx="282" cy="63" r="5.2" fill="url(#nd-gold)"/>

    <!-- Tagline -->
    <text x="1" y="92"
          font-family="Inter, system-ui, sans-serif"
          font-weight="500"
          font-size="11"
          letter-spacing="3.5"
          fill="#d4a574"
          opacity="0.85">NIGHT OPERATIONS DESK</text>
  </g>
</svg>